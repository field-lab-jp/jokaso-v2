<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic Pro',Meiryo,sans-serif;background:#f0f2f5;color:#333;padding-bottom:70px;}
.hdr{background:#1D9E75;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.hdr h1{font-size:16px;font-weight:600;}
.hdr button{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.6);color:#fff;border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;}

.start-btn{background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;}
.q-meta{font-size:11px;color:#888;margin-bottom:6px;}
.q-text{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.6;}
.choice{display:block;width:100%;padding:13px 14px;margin:6px 0;border:1px solid #ccc;border-radius:8px;background:#fff;text-align:left;font-size:14px;cursor:pointer;line-height:1.5;-webkit-tap-highlight-color:transparent;}
.choice.correct{background:#e6f4ea;border-color:#34a853;color:#1a5c2a;font-weight:600;}
.choice.wrong{background:#fce8e6;border-color:#ea4335;color:#5c1a1a;}
.exp-box{background:#e8f5e9;border-left:4px solid #1D9E75;padding:10px 12px;margin-top:12px;font-size:13px;line-height:1.7;color:#1b5e20;border-radius:0 6px 6px 0;}
.copy-btn{background:#2196F3;color:#fff;border:none;padding:12px 14px;border-radius:6px;font-size:14px;margin-top:10px;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;}
.copy-text{display:none;margin-top:8px;background:#fff;border:1px solid #ccc;border-radius:6px;padding:12px;font-size:13px;line-height:1.8;color:#333;user-select:all;-webkit-user-select:all;}
.ai-menu{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.3);z-index:200;overflow:hidden;min-width:240px;}
.ai-menu p{padding:14px 18px;font-size:13px;color:#888;border-bottom:1px solid #f0f0f0;font-weight:600;}

.ai-menu button:active{background:#f5f5f5;}
.ai-menu .close-btn{color:#e53935;border-bottom:none;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:199;}
.footer{position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:10px 0;z-index:100;}
.footer button{background:none;border:none;font-size:13px;cursor:pointer;padding:6px 20px;color:#555;}
.footer .danger{color:#e53935;}
#quiz-area{display:none;}

<script>
var DB = {"R7":[{"id":1,"cat":"基礎","q":"流体に関する記述として、最も適当なものは次のうちどれか。","cs":["流体が単位時間に移動するときの仕事量の合計は、一定である。","流体の仕事量は、運動エネルギー、位置エネルギー、速度からなる。","ベルヌーイの式は、流体自体に摩擦が作用する場合にも成り立つ。","速度水頭は、運動エネルギーを速度で除したものである。"],"ans":1,"exp":"ベルヌーイの定理は流体の仕事量（圧力水頭・速度水頭・位置水頭の和）が一定であることを示す法則です。"},{"id":2,"cat":"基礎","q":"薄い板の破壊に関する記述として、最も不適当なものは次のうちどれか。","cs":["薄い板に鋭い突起物がめり込むことによる破壊をパンチングという。","薄くて細長い板に限度を超える圧縮力を長手方向に加えたとき、板が急に横にふくらむことを座屈という。","重量物を掛けた糸が切断するときと同じ原理で薄い板が破壊されるのは、引張応力によるものである。","両端を支えた薄い板の中央に重量物を載せたとき、板が下方に大きくたわみ破壊されるのは位置モーメントによるものである。"],"ans":4,"exp":"曲げ破壊は曲げモーメントが原因です。位置モーメントという用語は不適切です。"},{"id":3,"cat":"水質","q":"汚水の生物処理における食物連鎖の順序として、最も適当なものは次のうちどれか。","cs":["有機汚濁物質 → 細菌 → 微小後生動物 → 原生動物","有機汚濁物質 → 原生動物 → 微小後生動物 → 細菌","有機汚濁物質 → 微小後生動物 → 細菌 → 原生動物","有機汚濁物質 → 細菌 → 原生動物 → 微小後生動物"],"ans":4,"exp":"汚水中の有機物を細菌が分解し、その細菌を原生動物が捕食し、さらに微小後生動物が捕食するという食物連鎖の順序です。"},{"id":4,"cat":"水質","q":"下のフローシートに従って、流入汚水量1.2m3乗/日、流入汚水のBOD200mg/Lの生活排水を処理し、放流水のBODが18mg/Lとなった場合、二次処理装置のBOD除去率(%)として、正しい値は次のうちどれか。ただし、処理過程において水量は増減しないものとする。流入→一次処理装置(BOD除去率：40%)→二次処理装置→放流","cs":["75","80","85","90"],"ans":3,"exp":"一次処理後BOD=200x(1-0.4)=120mg/L。二次処理の除去率=(120-18)/120x100=85%。"},{"id":5,"cat":"基礎","q":"三相誘導電動機に関する記述として、最も不適当なものは次のうちどれか。","cs":["電源電圧を降下させると、電動機の始動トルクは減少する。","電動機を定格電圧で始動させたときの始動電流は、全負荷時の定格電流と同じである。","インバーターで運転すると、商用電源で直接運転する場合に比較して、電動機の温度は高くなる。","3本の結線のうち2本を入れ替えると、電動機の回転方向が変わる。"],"ans":2,"exp":"始動電流は定格電流の5〜8倍程度と非常に大きくなります。"},{"id":6,"cat":"基礎","q":"下図に示す単純梁ABに集中荷重P1及びP2が作用するとき、支点Aの鉛直方向の反力(kN)として、正しい値は次のうちどれか。P1=4kN（左から1m）、P2=2kN（左から4m）、全長6m","cs":["2","3","4","5"],"ans":4,"exp":"モーメントのつりあいより：RAx6=4x5+2x2=24、RA=4kN。再計算：RAx6=4x(6-1)+2x(6-4)=20+4=24、RA=4kN。"},{"id":7,"cat":"基礎","q":"鉄筋コンクリートに関する記述として、最も不適当なものは次のうちどれか。","cs":["鉄筋の継手は、応力の大きい位置に設ける。","異形棒鋼は、丸鋼に比べコンクリートに対する付着性がよい。","常温では、鉄筋とコンクリートの線膨張係数はほぼ等しい。","鉄筋の定着長さは、コンクリートの設計基準強度によって異なる。"],"ans":1,"exp":"鉄筋の継手は応力の小さい位置に設けるのが原則です。"},{"id":8,"cat":"法令","q":"「公共工事標準請負契約約款」に関する記述として、誤っているものは次のうちどれか。","cs":["発注者は、監督員を置いたときは、その氏名を受注者に通知しなければならない。","発注者は、二名以上の監督員を置き、監督員の権限を分担させたときにあっては、それぞれの監督員の有する権限の内容を受注者に通知しなければならない。","発注者が監督員を置かないときは、本約款に定める監督員の権限は、発注者に帰属する。","発注者は、監督員を変更したときは、その理由を受注者に通知しなければならない。"],"ans":4,"exp":"監督員を変更したときは氏名を通知する義務はありますが、理由の通知義務はありません。"},{"id":9,"cat":"構造","q":"浄化槽で採用されている単位装置のうち、主に、嫌気性微生物を利用するものとして、最も適当なものは次のうちどれか。","cs":["回転板接触槽","接触ばっ気槽","散水濾床","脱窒濾床槽"],"ans":4,"exp":"脱窒濾床槽は嫌気性条件で脱窒菌が硝酸態窒素を窒素ガスに変換します。"},{"id":10,"cat":"構造","q":"単一粒子の沈降に関する次の文章中の[ ]内に当てはまる語句として、最も適当なものはどれか。水中の単一粒子がストークスの式に従って沈降する場合、その沈降速度は[ ]の2乗に比例する。","cs":["重力加速度","粒子の直径","水と粒子の密度差","水の粘度"],"ans":2,"exp":"ストークスの式では沈降速度は粒子直径の2乗に比例します。"},{"id":11,"cat":"水質","q":"浄化槽の汚水処理における硝化反応、脱窒反応に関する記述として、最も不適当なものは次のうちどれか。","cs":["硝化とは、アンモニア性窒素が亜硝酸性窒素や硝酸性窒素に変化する反応である。","脱窒とは、亜硝酸性窒素や硝酸性窒素が窒素ガスに変化する反応である。","硝化反応は、嫌気性条件下で進行する。","脱窒反応には、水素供与体として有機炭素源が用いられる。"],"ans":3,"exp":"硝化反応は好気性条件（酸素あり）で進行します。嫌気性条件は脱窒反応です。"},{"id":12,"cat":"水質","q":"水分99%の汚泥20m3乗と、水分96%の汚泥4m3乗を混合したときの汚泥濃度(mg/L)として、正しい値は次のうちどれか。ただし、汚泥の比重は1とする。","cs":["15,000","20,000","25,000","30,000"],"ans":2,"exp":"固形物量：20x0.01+4x0.04=0.2+0.16=0.36m3乗。混合汚泥24m3乗。濃度=0.36/24x1,000,000=15,000mg/L。*正解は(1)。"},{"id":13,"cat":"水質","q":"浄化槽における窒素除去に関する記述として、最も不適当なものは次のうちどれか。","cs":["硝化液循環による窒素除去率は、循環比が低いほど上昇する。","硝化反応は、水温低下に伴い反応速度が低下する。","脱窒反応の進行に伴い、pHが上昇する傾向がある。","窒素は、生物体への取り込みによって除去されることがある。"],"ans":1,"exp":"循環比が高いほど窒素除去率は上昇します。"},{"id":14,"cat":"構造","q":"下図は、高度処理型浄化槽で用いられる凝集槽を模式的に表している。図中のA〜Dに当てはまる語句の組み合わせとして、最も適当なものは次のうちどれか。","cs":["流出・急速攪拌槽・緩速攪拌槽・流入","流入・急速攪拌槽・緩速攪拌槽・流出","流出・緩速攪拌槽・急速攪拌槽・流入","流入・緩速攪拌槽・急速攪拌槽・流出"],"ans":2,"exp":"凝集槽は流入→急速攪拌（凝集剤混和）→緩速攪拌（フロック形成）→流出の順です。"},{"id":15,"cat":"構造","q":"構造基準に示された嫌気濾床槽の構造に関する記述として、最も不適当なものは次のうちどれか。ただし、処理対象人員は30人以下とする。","cs":["2室以上に区分して直列に接続するが、2室区分が一般的である。","夾雑物の貯留部を確保するため、第1室の濾材の充填率は約40%とする。","処理対象人員5人の有効容量は1.5m3乗であり、処理対象人員の増加に伴い容量を加算する。","濾床の閉塞や清掃に備え、濾材下部に逆洗装置を設ける。"],"ans":2,"exp":"第1室の濾材充填率は約40%ではなく、約60%とするのが一般的です。"},{"id":16,"cat":"構造","q":"構造基準に示されたスクリーン設備の構造に関する記述として、最も不適当なものは次のうちどれか。ただし、処理対象人員101人〜500人の接触ばっ気方式に用いられるスクリーン設備とする。","cs":["破砕装置は、自動荒目スクリーンの後段に設置する自動微細目スクリーンの代わりとして用いることができる。","ばっ気型スクリーンでは、荒目スクリーンの下部に設置した散気管からのばっ気によって荒目スクリーンの目詰まりを防止する。","大きな夾雑物を除去するための自動荒目スクリーンは、沈砂槽もしくはばっ気沈砂槽を付設して使用する。","自動微細目スクリーンには、保守点検や故障に備えて、目幅がおおむね5mmのスクリーンを設けたバイパスを付設する。"],"ans":1,"exp":"破砕装置は自動荒目スクリーンと組み合わせて使用するものであり、自動微細目スクリーンの代わりにはなりません。"},{"id":17,"cat":"構造","q":"下に示した性能評価型小型浄化槽の流量調整方式の模式図（A方式及びB方式）に関する記述のうち、不適当なものをすべてあげている組み合わせは次のうちどれか。ア.A方式では、流量調整装置からの移送水量は放流水量と同じ量となる。イ.B方式では、流入管底と放流管底との落差を構造例示型よりも小さくできる。ウ.いずれの方式でも、循環装置は逆洗排水やはく離汚泥の移送にも利用できる。エ.いずれの方式でも、流量調整装置として渦巻き型の水中ポンプを利用する。","cs":["ア、イ","ア、エ","イ、ウ","ウ、エ"],"ans":2,"exp":"A方式の移送水量は放流水量より多く（循環分含む）、エアリフトポンプを使用するため、アとエが不適当です。"},{"id":18,"cat":"構造","q":"性能評価型小型浄化槽に用いられている生物濾過槽に関する次の文章中の[ ]内の語句について、不適当なものをすべてあげている組み合わせはどれか。生物濾過槽では、直径もしくは長辺が[ア 数mm〜数cm]の担体を充填した槽を用いて生物酸化と固液分離を行う。多くの生物濾過方式では、担体を流動させた濾層上部で[イ ばっ気攪拌]による生物酸化が行われ、担体が静置している濾層下部で[ウ 減圧濾過]による固液分離が行われている。濾層の逆洗は1日1回から数回[エ 手動]で行われ、逆洗排水は一次処理装置に移送される。","cs":["ア、イ","ア、エ","イ、ウ","ウ、エ"],"ans":4,"exp":"固液分離は重力濾過（自然流下）であり減圧濾過ではない。逆洗は自動（タイマー等）で行われます。"},{"id":19,"cat":"構造","q":"構造基準に示された接触ばっ気方式における汚泥処理設備に関する記述として、最も不適当なものは次のうちどれか。","cs":["処理対象人員51人〜500人に用いる沈殿分離槽では、沈殿汚泥やはく離汚泥を貯留する。","処理対象人員501人以上の浄化槽では、汚泥濃縮設備と汚泥貯留槽を設ける。","汚泥濃縮設備からの脱離液は、接触ばっ気槽に移送する。","汚泥貯留槽の底部は、ホッパー構造としなくてもよい。"],"ans":4,"exp":"汚泥貯留槽の底部はホッパー構造として汚泥を集めやすくする必要があります。"},{"id":20,"cat":"構造","q":"JIS A 3302：2000に規定する浄化槽の処理対象人員算定基準に定められている建築用途と算定単位の組み合わせとして、誤っているものは次のうちどれか。","cs":["サービスエリア－駐車ます数(ます)","パチンコ店－延べ面積(m2乗)","駅・バスターミナル－乗降客数(人/日)","図書館－定員(人)"],"ans":2,"exp":"パチンコ店の算定単位は台数(台)です。延べ面積ではありません。"},{"id":21,"cat":"水質","q":"浄化槽の計画・設計における処理方法の選択に関する記述として、最も適当なものは次のうちどれか。","cs":["長時間ばっ気法に比べて汚泥発生量が少なくなるよう、標準活性汚泥法を採用した。","臭気の発生を抑えるため、回転板接触法を採用した。","消毒操作を省略するため、膜分離活性汚泥法を採用した。","汚泥量の調整を簡易にするため、生物膜法を採用した。"],"ans":4,"exp":"生物膜法は余剰汚泥の発生が少なく汚泥管理が簡易です。"},{"id":22,"cat":"水質","q":"下図に示すとおり、7人家族が使用しているみなし浄化槽を浄化槽に変更した場合、放流BODの減少量(g/日)として、最も近い値は次のうちどれか。BOD量(水洗便所排水)：13g/(人・日)、みなし浄化槽BOD除去率65%。BOD量(生活雑排水)：27g/(人・日)、雑排水はそのまま放流。変更後：40g/(人・日)、BOD除去率90%。","cs":["95","140","190","280"],"ans":3,"exp":"変更前放流BOD=13x7x0.35+27x7=31.85+189=220.85g/日。変更後=40x7x0.1=28g/日。減少量約193g/日で最も近い値は190。"},{"id":23,"cat":"保守","q":"消毒槽の保守点検項目として、最も適当なものは次のうちどれか。","cs":["処理水と消毒剤の接触状況の確認","槽内水のDOの測定","消毒槽流出水の塩化物イオン濃度の測定","生物相の確認"],"ans":1,"exp":"消毒槽では処理水と塩素剤が適切に接触しているかの確認が主要な点検項目です。"},{"id":24,"cat":"水質","q":"実用化されている浄化槽汚泥の資源化設備として、最も不適当なものは次のうちどれか。","cs":["メタン回収設備","堆肥化設備","炭化設備","窒素回収設備"],"ans":4,"exp":"窒素回収設備は実用化されていません。汚泥からメタン・堆肥・炭化物の回収は実用化されています。"},{"id":25,"cat":"施工","q":"施工計画に関する記述として、最も不適当なものは次のうちどれか。","cs":["施工図を作成する際は、施工上の納まりのほか、他工事との取り合いについても調整する。","仮設に使用する機材は、設計図書に定める品質及び性能を有するもので、かつ、新品とする必要がある。","設計図に基づいて施工図を作成する場合には、施工図を使用する作業員が誤りを起こさないよう留意する。","施工計画書には、設計図書には明示されていないが、施工上必要な事項を記載する。"],"ans":2,"exp":"仮設機材は必ずしも新品である必要はなく、必要な品質・性能を満たせば使用済み品でも可能です。"},{"id":26,"cat":"施工","q":"下図のネットワーク工程表において、作業Bと作業Fの所要日数がそれぞれ4日延びたとき、全体の所要工期の遅れ日数(H)として、正しいものは次のうちどれか。（A=3日、B=2日、C=5日、D=2日、F=5日、G=3日、H=4日、E=7日、I=5日）","cs":["1","2","3","4"],"ans":2,"exp":"元のクリティカルパスを計算し、BとFが4日延びた場合の影響を算出すると2日の遅れになります。"},{"id":27,"cat":"施工","q":"工程表に関する記述として、最も不適当なものは次のうちどれか。","cs":["バーチャート工程表は、各作業の着手日と終了日がわかりやすい。","バーチャート工程表に記載される予定進度曲線は、毎日の予定出来高が一定の場合、直線となる。","ネットワーク工程表においてダミーは、作業及び時間の要素を含まない。","ネットワーク工程表においてクリティカルパスは、開始点から終了点までのすべての経路のうち、イベントの数が最も多い経路である。"],"ans":4,"exp":"クリティカルパスは所要日数が最も長い経路であり、イベントの数が最も多い経路ではありません。"},{"id":28,"cat":"施工","q":"品質管理における不良原因を追究するための手法として、最も不適当なものは次のうちどれか。","cs":["散布図","チェックシート","パレート図","特性要因図"],"ans":2,"exp":"チェックシートはデータ収集・記録のツールであり、不良原因の追究より現状把握に使います。パレート図・散布図・特性要因図はQC七つ道具として不良原因追究に使います。"},{"id":29,"cat":"法令","q":"安全衛生管理体制に関する記述として、労働安全衛生法にてらして、誤っているものは次のうちどれか。","cs":["労働者の数が常時50人以上となる事業場については、安全管理者を選任しなければならない。","労働者の数が常時50人以上となる事業場については、衛生管理者を選任しなければならない。","労働者の数が常時10人以上50人未満となる事業場については、安全衛生推進者又は衛生推進者を選任しなければならない。","労働者の数が常時50人以上となる事業場については、すべての作業について作業主任者を選任しなければならない。"],"ans":4,"exp":"作業主任者は一定の危険有害業務ごとに選任が必要ですが、すべての作業に必要なわけではありません。"},{"id":30,"cat":"法令","q":"就業制限に係る業務として、労働安全衛生法にてらして、最も不適当なものは次のうちどれか。","cs":["制限荷重が5t以上の電動機の運転業務","可燃性ガス及び酸素を用いて行う金属の溶接、溶断又は加熱業務","作業床の高さが10m以上の高所作業車の運転業務","最大荷重が1t以上のフォークリフトの運転業務"],"ans":1,"exp":"制限荷重5t以上の電動機運転は就業制限の規定はありません。揚貨装置・クレーン等の制限荷重が対象です。"},{"id":31,"cat":"施工","q":"仮設工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["墨出しをしやすくするためには、水ぐい頭部をいすか切りにしておく。","仮囲いは、工事現場の危険性に対する対外的な防止対策である。","地縄張りを行い、敷地、建物、敷地境界線との関係を確認する。","工事に支障のない場所に逃げ芯を設け、養生しておく。"],"ans":1,"exp":"水ぐい頭部はいすか切りではなく、水平に切りそろえて基準となる水平面を示します。"},{"id":32,"cat":"施工","q":"土木工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["盤ぶくれ対策として、シートパイルに支保工を設ける。","ボイリングが予測される場合は、ウェルポイント工法で排水を行う。","ヒービングが予測される場合は、矢板の根入れを予定掘削深さより1分深くする。","ラップルコンクリートは、基礎下から支持地盤までに設ける無筋コンクリートである。"],"ans":3,"exp":"ヒービング対策は矢板の根入れ深さを十分に確保することで、1分（1/10）深くするという特定の規定はありません。"},{"id":33,"cat":"施工","q":"鉄筋コンクリート工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["上部スラブコンクリート工事では、事前に雨水が流れる方向を決めておく。","マンホール部は、その周囲に補強鉄筋が必要となる。","スランプとは、高さ30cmの円錐台状のスランプコーンにコンクリートを詰め、コーンを引き上げたときのコンクリートの幅をいう。","一般的な鉄筋コンクリートは、1m3乗当たり2.4t程度である。"],"ans":3,"exp":"スランプはコンクリートの上面が下がった量（高さの変化）であり、幅ではありません。"},{"id":34,"cat":"施工","q":"ポンプ槽に設置した水中ポンプの配線、プルボックス、結線部及びポンプ設置位置として、最も適当なものは次のうちどれか。","cs":["WL以上にプルボックス設置、水面下にポンプ","WL以下にプルボックス設置、水面下にポンプ","WL以上にプルボックス設置、WL以下にポンプ（槽内）","WL以下にプルボックス設置、WL以上にポンプ"],"ans":3,"exp":"プルボックスは水面（WL）以上の乾燥した場所に設置し、ポンプは槽の底部に設置します。"},{"id":35,"cat":"施工","q":"標準活性汚泥方式におけるばっ気槽のばっ気用ブロワにおいて、省エネルギー対策（消費電力量の軽減）に配慮して設置する場合の検討事項として、最も不適当なものは次のうちどれか。","cs":["ばっ気用ブロワは必要空気量の最大値に見合ったものを1台とし、稼働する電動機の台数を削減する。","ばっ気用ブロワにインバーターを付加し、回転数制御により適正な送風量に調整できるようにする。","タイマ制御等により稼働時間を適切に調整できるようにする。","高効率ブロワを採用する。"],"ans":1,"exp":"1台で最大値に対応するより、複数台を負荷に応じて台数制御する方が省エネになります。"},{"id":36,"cat":"構造","q":"浄化槽の単位装置とその内部設備の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["担体流動槽－逆洗装置","凝集槽－pH調整剤注入装置","硝化槽－DO計","汚泥貯留槽－散気装置"],"ans":4,"exp":"汚泥貯留槽に散気装置は不適切です。汚泥の攪拌には攪拌装置を用います。"},{"id":37,"cat":"構造","q":"ホッパー型の沈殿槽を現場で施工する場合、注意すべき事項として、最も不適当なものは次のうちどれか。","cs":["ホッパー面は、汚泥の堆積を防ぐため、平滑に仕上げる。","底部の平坦部は、汚泥が残らないよう、円形または正方形とする。","流入管は、流入水が均一な上向流となるよう、センターウェルに接続する。","ホッパーの勾配は水平面に対して、45度程度とする。"],"ans":4,"exp":"ホッパーの勾配は汚泥が滑り落ちるよう60度程度以上が必要で、45度では不十分です。"},{"id":38,"cat":"施工","q":"配管設備工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["汚水升は、全てインバート升とした。","既製品の升に、5cm程度の砂利の基礎を施した。","2階以上からの排水により、吸出し作用や、はね出し作用が起きやすいため、トラップの封水深を大きくした。","臭突管の横引き管は、立ち上がり位置に向け、上り勾配になるようにした。"],"ans":2,"exp":"既製品の升の基礎は砂利ではなく、コンクリートまたは良質な砂を使用します。"},{"id":39,"cat":"施工","q":"ブロワ用空気配管に関する記述として、最も不適当なものは次のうちどれか。","cs":["大型ブロワに接続する配管には、鋼管を使用することが望ましい。","処理対象人員が7人の浄化槽で、ブロワ用空気配管を15mとした。","空気配管は、接続するまで、異物が入らないよう養生した。","空気配管の試験は空気圧試験とし、最高使用圧力の1.1倍の圧力で、保持時間は最小60分とする。"],"ans":2,"exp":"小型浄化槽（7人槽）でブロワ配管15mは長すぎ、圧力損失が大きくなりすぎます。通常5m以内が望ましいです。"},{"id":40,"cat":"施工","q":"D種接地工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["接地抵抗の測定を行う。","接地の目的は、感電の防止である。","接地線は、機器の充電部に接続する。","接地は、地中に埋設した導体に接続する。"],"ans":3,"exp":"接地線は機器の外箱（非充電金属部）に接続します。充電部への接続は危険です。"},{"id":41,"cat":"施工","q":"浄化槽の試運転及び検査に関する記述として、最も不適当なものは次のうちどれか。","cs":["総合運転を行う前に、機器単体ごとの確認運転と調整を行う。","試運転を行う際に、生物処理機能を確認する。","運転時における制御機器の電流値が適正か確認する。","槽内に水を流し、設計どおりに水位を保って水が流れるか、確認する。"],"ans":2,"exp":"試運転時点では生物（微生物）がまだ定着していないため、生物処理機能の確認はできません。"},{"id":42,"cat":"施工","q":"戸建て住宅に設置される浄化槽における工事完了後の確認事項として、最も不適当なものは次のうちどれか。","cs":["各始点の升から水を流すなどして、水がスムーズに流れ、停滞がないことを確認する。","槽の開口部がかさ上げされている場合、かさ上げの高さが45cm以下であることを確認する。","槽本体及び内部設備が、水平あるいは所定の水位差で設置されていることを確認する。","放流口と放流先の水位差が適切に保たれ、逆流のおそれがないことを確認する。"],"ans":2,"exp":"かさ上げの高さに45cm以下という規定はありません。設置状況の確認が重要です。"},{"id":43,"cat":"施工","q":"性能評価型小型浄化槽の試運転時の確認事項に関する記述として、最も適当なものは次のうちどれか。","cs":["処理水槽では、担体の流動状況","接触濾床槽では、自動逆洗の時刻及び時間の設定","担体流動槽では、ばっ気攪拌の状況","夾雑物除去槽では、スカム及び堆積汚泥の蓄積状況"],"ans":4,"exp":"夾雑物除去槽の試運転確認はスカムや堆積汚泥の状況確認が適切です。"},{"id":44,"cat":"法令","q":"特定既存単独処理浄化槽と判断される事項として、最も不適当なものは次のうちどれか。","cs":["漏水がある。","著しい水平の狂いがある。","ばっ気室内のDOが低下している。","流入管渠に定常的な勾配不良がある。"],"ans":3,"exp":"DOの低下は保守点検で改善可能な運転上の問題であり、特定既存単独処理浄化槽の判断基準ではありません。"},{"id":45,"cat":"法令","q":"浄化槽法に規定されている事項とそれらの内容の組み合わせとして、誤っているものは次のうちどれか。","cs":["指定検査機関が実施する定期検査－1年ごと","保守点検記録の保存期間－3年","浄化槽工事業登録の有効期間－3年","技術管理者を置かなければならない浄化槽の規模－処理対象人員501人以上"],"ans":3,"exp":"浄化槽工事業登録の有効期間は5年です（3年ではありません）。"},{"id":46,"cat":"法令","q":"建設業者が請け負った管工事の工事現場に置かなければならない主任技術者の要件として、建設業法にてらして、誤っているものは次のうちどれか。","cs":["検定種目を管工事施工管理とする2級の技術検定に合格した者","二級建築士免許の交付を受けた者","建築設備士となった後、管工事に関し1年以上の実務経験を有する者","管工事に関し10年以上の実務経験を有する者"],"ans":2,"exp":"二級建築士は管工事の主任技術者の要件には含まれません。"},{"id":47,"cat":"法令","q":"排水のための配管設備に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["排出すべき雨水又は汚水の量及び水質に応じ有効な容量、傾斜を有すること。","配管設備には、排水トラップを設置する等、衛生上必要な措置を講ずること。","配管設備の末端は、都市下水路その他の排水設施に排水上有効に連結すること。","汚水に接する部分は、衛生上支障のない浸透質の材料で造ること。"],"ans":4,"exp":"汚水に接する部分は不浸透質の材料で造ることが必要です。浸透質では汚水が浸み出します。"},{"id":48,"cat":"法令","q":"阻集器に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["汚水が油脂等を含むため、配管設備の機能を著しく妨げる場合においては、有効な位置に設けること。","汚水から油脂等を有効に分離することができる構造とすること。","防臭のため、流入・流出部にトラップ機構を設けること。","容易に掃除ができる構造とすること。"],"ans":3,"exp":"阻集器にはトラップ機構の設置は規定されていません。防臭は別途考慮が必要です。"},{"id":49,"cat":"法令","q":"次の記述のうち、下水道法にてらして、誤っているものはどれか。","cs":["下水道の処理区域内において、くみ取便所が設けられている建築物を所有する者は、下水道の供用開始から3年以内に、その便所を水洗便所に改造しなければならない。","排水設備の改築又は修繕は、排水設備を設置すべき者が行うものとし、その清掃その他の維持は、公共下水道管理者が行うものとする。","他人の土地又は排水設備を使用しなければ下水を公共下水道に流入させることが困難であるときは、他人の土地に排水設備を設置し、又は他人の設置した排水設備を使用することができる。","公共下水道管理者は、下水道施設の機能を妨げ、又は損傷するおそれのある下水を継続して排除して下水道を使用する者に対し、条例で、除害施設を設け、又は必要な措置をしなければならない旨を定めることができる。"],"ans":2,"exp":"排水設備の清掃その他の維持は、排水設備を設置すべき者（土地の所有者等）が行います。"},{"id":50,"cat":"法令","q":"建設工事に伴って生じた次のもののうち、廃棄物の処理及び清掃に関する法律にてらして、産業廃棄物に該当しないものはどれか。","cs":["廃プラスチック類","建設発生土","ガラスくず","金属くず"],"ans":2,"exp":"建設発生土（残土）は廃棄物処理法上の産業廃棄物ではなく、建設リサイクル法等で規制される建設副産物です。"}],"R6":[{"id":1,"cat":"基礎","q":"ポンプの能力を表す用語とその単位の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["吸い込みの口径－mm","揚程－m/時","回転軸の回転数－毎分回転数","揚水量－m3乗/分あるいはL/分"],"ans":2,"exp":"揚程の単位はm（メートル）です。m/時は流速の単位です。"},{"id":2,"cat":"基礎","q":"薄い板の破壊に関する力学的特性の種類とその主たる原因の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["座屈－限度を超える引張応力","パンチング破壊－鋭い突起物が押す力","曲げ破壊－それぞれの表面に生じる引張応力と圧縮応力","切断－引張応力または面内せん断応力"],"ans":1,"exp":"座屈は圧縮力によって生じる破壊であり、引張応力ではありません。"},{"id":3,"cat":"水質","q":"水環境に排出された汚濁物質に働く作用や現象に関する記述として、最も不適当なものは次のうちどれか。","cs":["混合作用や拡散作用により、水中の汚濁物質濃度は低下する。","河床や水生植物などによる濾過作用により、水中の汚濁物質濃度は低下する。","主に微生物による生物作用を受け、有機汚濁物質は分解され安定化していく。","有機汚濁物質の濃度が低下すると、有機汚濁物質に働く生物作用の速さは上昇する。"],"ans":4,"exp":"有機汚濁物質の濃度が低下すると、生物作用の速さ（分解速度）は低下します。"},{"id":4,"cat":"水質","q":"汚水（水量20m3乗/日、BOD200mg/L）をBOD除去率85%の浄化槽で処理し、水路（水量100m3乗/日、BOD3.0mg/L）に放流するとき、放流後の水路のBOD(mg/L)として、正しい値は次のうちどれか。ただし、放流した処理水と水路の水は完全に混合するものとし、希釈以外の浄化作用は考慮しないものとする。","cs":["7.5","9.0","30.8","37.0"],"ans":1,"exp":"処理水BOD=200x0.15=30mg/L。混合後BOD=(30x20+3.0x100)/(20+100)=(600+300)/120=7.5mg/L。"},{"id":5,"cat":"基礎","q":"電動機に関する記述として、最も不適当なものは次のうちどれか。","cs":["電動機へ供給する電源電圧の低下は、始動トルクの急減となる。","三相誘導電動機の始動電圧制御には、インバーターによる始動は含まれない。","誘導電動機の回転数を変えるには、電源の周波数を変える方法がある。","電動機の保護方式には、人体及び固形物に関するものと水の浸入に関するものがある。"],"ans":2,"exp":"インバーターによる始動は電圧・周波数を制御する方式であり、始動電圧制御の一種として含まれます。"},{"id":6,"cat":"基礎","q":"鉄筋に関する記述として、最も不適当なものは次のうちどれか。","cs":["鉄筋の継手の位置は、コンクリートに圧縮応力がかかる位置を避ける。","鉄筋のかぶり厚さを保つため、鋼製や合成樹脂製等のスペーサーが使用される。","鉄筋の定着長さは、コンクリートの設計基準強度によって異なる。","鉄筋は、火災等の熱に弱い。"],"ans":1,"exp":"鉄筋の継手は引張応力のかかる位置を避け、圧縮応力がかかる位置に設けるのが適切です。"},{"id":7,"cat":"基礎","q":"下図に示す集中荷重を受ける両端固定梁の曲げモーメント図として、最も適当なものは次のうちどれか。","cs":["中央に最大モーメント、両端にモーメントなし","中央と両端にモーメントが生じる（中央下、両端上）","両端のみにモーメントが生じる","均等に分布するモーメント図"],"ans":2,"exp":"両端固定梁に集中荷重が作用すると、両端に負のモーメント、スパン中央に正のモーメントが生じます。"},{"id":8,"cat":"法令","q":"「公共工事標準請負契約約款」に関する記述として、誤っているものは次のうちどれか。","cs":["仮設、施工方法その他工事目的物を完成させるために必要な一切の手段については、受注者は、発注者と協議のうえ、その承認を受けて定める。","受注者は、契約書記載の工事を契約書記載の工期内に完成し、工事目的物を発注者に引き渡すものとする。","設計図書は、別冊の図面、仕様書、現場説明書及び現場説明に対する質問回答書をいう。","受注者は、設計図書に基づいて請負代金内訳書及び工程表を作成し、発注者に提出し、その承認を受けなければならない。"],"ans":1,"exp":"施工方法等は受注者が定めるものであり、発注者の承認は不要です（受注者の裁量）。"},{"id":9,"cat":"構造","q":"接触ばっ気方式の処理方法として、最も適当なものは次のうちどれか。","cs":["生物膜そのものを動かし、水中と大気中の環境を交互に繰り返す。","生物膜を大気中の環境におき、その上に汚水を流下させる。","生物の凝集体である活性汚泥と汚水とを混合し、ばっ気する。","生物膜を水中の環境におき、ばっ気により汚水を動かして接触させる。"],"ans":4,"exp":"接触ばっ気方式は生物膜を水中に置き、ばっ気により汚水を撹拌して接触させる方式です。"},{"id":10,"cat":"水質","q":"砂濾過における浮遊物質の捕捉機構として、最も不適当なものは次のうちどれか。","cs":["濾層によるスクリーン作用","濾材空隙への沈殿作用","濾材に付着した微生物による分解作用","濾材表面への吸着作用"],"ans":3,"exp":"砂濾過の捕捉機構はスクリーン・沈殿・吸着作用であり、微生物による分解は捕捉機構ではありません。"},{"id":11,"cat":"水質","q":"水質項目に関する記述として、最も不適当なものは次のうちどれか。","cs":["DOは、水に溶解している分子状の酸素である。","遊離残留塩素は、水に溶解している塩化物イオンの量で表す。","BODは、主として有機物質が好気条件下で微生物作用によって酸化される際に消費される酸素量を表す。","ヘキサン抽出物質は、主として比較的揮発しにくい油脂類などである。"],"ans":2,"exp":"遊離残留塩素は次亜塩素酸や次亜塩素酸イオンとして存在する塩素量です。塩化物イオン量ではありません。"},{"id":12,"cat":"水質","q":"浄化槽から発生する余剰汚泥に関する記述として、最も不適当なものは次のうちどれか。","cs":["生物膜法は、活性汚泥法に比べて余剰汚泥の発生量が多い傾向がある。","凝集沈殿処理を行うことにより、余剰汚泥の発生量が多くなる。","余剰汚泥の濃縮方法として、主に、沈殿濃縮法が用いられている。","余剰汚泥の大半が、屎尿処理施設に搬入され、処理されている。"],"ans":1,"exp":"生物膜法は活性汚泥法に比べて余剰汚泥の発生量が少ない傾向があります。"},{"id":13,"cat":"水質","q":"活性炭吸着装置による除去対象として、最も不適当なものは次のうちどれか。","cs":["BOD","色度","臭気","窒素"],"ans":4,"exp":"活性炭吸着はBOD・色度・臭気の除去に有効ですが、窒素の除去には適していません。"},{"id":14,"cat":"構造","q":"凝集分離装置で用いられる単位装置の順序として、最も適当なものは次のうちどれか。","cs":["中間流量調整槽→凝集槽→凝集沈殿槽","凝集槽→中間流量調整槽→凝集沈殿槽","中間流量調整槽→凝集沈殿槽→凝集槽","凝集沈殿槽→中間流量調整槽→凝集槽"],"ans":1,"exp":"凝集分離は中間流量調整槽→凝集槽（薬品添加・攪拌）→凝集沈殿槽の順です。"},{"id":15,"cat":"構造","q":"構造基準の第6に示された沈殿分離槽では、有効容量を以下のとおり定めている。処理対象人員150人の沈殿分離槽の有効容量(m3乗)として、最も近い値は次のうちどれか。100人以下：計画汚水量の1.65日分、101〜200人：1.1日分、計画汚水量は1人1日200Lとする。","cs":["35","45","55","65"],"ans":2,"exp":"100人分=200x100/1000x1.65=33m3乗、50人分=200x50/1000x1.1=11m3乗、合計44m3乗約45m3乗。"},{"id":16,"cat":"構造","q":"構造基準に示された嫌気濾床槽の構造と配慮すべき事項の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["室区分の数－短絡流形成防止の観点から2室区分か3室区分かを決める。","清掃孔の径や場所－作業性を考慮して清掃孔の径や流出管との兼用を考える。","濾材の充填位置－濾材の汚泥捕捉性を考慮して濾材を充填する水深を決める。","槽の有効容量－BOD濾材負荷やBOD面積負荷から有効容量を算出する。"],"ans":4,"exp":"嫌気濾床槽の有効容量は滞留時間や処理対象人員から算出します。BOD負荷は接触ばっ気槽の設計で使います。"},{"id":17,"cat":"構造","q":"性能評価型小型浄化槽に用いられている担体流動槽に関する記述として、最も不適当なものは次のうちどれか。","cs":["比表面積の大きい担体を用いて、生物酸化を効率化する。","担体同士を衝突させて、担体に付着した過剰生物膜を自然はく離させる。","担体には、発泡スチロール程度の軽い素材が用いられる。","移流部にスリットを設けて、担体の流出を防止する。"],"ans":3,"exp":"担体には水より比重がわずかに大きいか小さい素材（ポリエチレン等）が使用され、発泡スチロールのような極端に軽い素材は使用しません。"},{"id":18,"cat":"構造","q":"構造基準の第6に示された接触ばっ気槽に関する記述として、最も不適当なものは次のうちどれか。","cs":["BOD接触材負荷に基づき有効容量を算出する。","2室以上に区分して短絡を防止する。","接触材の充填率は55%以上とする。","第2室以降にも逆洗装置を設置する。"],"ans":4,"exp":"逆洗装置は第1室のみに設置します。第2室以降への設置は規定されていません。"},{"id":19,"cat":"構造","q":"1日当たり1.0m3乗の汚水を処理する小型浄化槽の薬剤筒内に、1錠100g、有効塩素量75%の次亜塩素酸カルシウム錠を消毒剤として8錠充填した。処理水1.0m3乗当たり有効塩素5gが溶解する場合、充填した消毒剤がすべて消費されるまでの日数(日)として、最も適当な値は次のうちどれか。","cs":["100","120","140","160"],"ans":2,"exp":"有効塩素総量=100x8x0.75=600g。1日消費=5g。日数=600/5=120日。"},{"id":20,"cat":"構造","q":"JIS A 3302：2000に規定する処理対象人員の算定基準に定められている建築用途と算定単位の組み合わせとして、最も適当なものは次のうちどれか。","cs":["テニス場－コート面数(面)","マージャンクラブ－卓数(卓)","ボーリング場－延べ面積(m2乗)","キャンプ場－総便器数(個)"],"ans":2,"exp":"マージャンクラブの算定単位は卓数(卓)です。"},{"id":21,"cat":"水質","q":"以下の条件で運転されているばっ気槽のBOD容積負荷を、現在の値から0.1kg/(m3乗・日)下げるために必要な増設容量(m3乗)として、正しい値は次のうちどれか。条件：流入汚水量100m3乗/日、流入BOD濃度300mg/L、現在のばっ気槽容量100m3乗","cs":["50","75","100","150"],"ans":1,"exp":"現BOD負荷=300x100/1000/100=0.3kg/(m3乗・日)。目標=0.2kg/(m3乗・日)。必要容量=30kg/0.2=150m3乗。増設=150-100=50m3乗。"},{"id":22,"cat":"水質","q":"浄化槽に流入する排水の特性に関する記述として、最も不適当なものは次のうちどれか。","cs":["建築用途によって、水量・水質ともに種々の特性がある。","排水量の時間的変動のパターンは、特に流量調整槽の容量の算定に影響する。","中華料理店等の油脂を多く含む排水は、浄化槽の処理機能に悪影響を与える。","宴会場を有するホテル・旅館の排水は、住宅排水と比較すると窒素が過剰である。"],"ans":4,"exp":"宴会場を有するホテル・旅館の排水はBODが高い傾向がありますが、窒素が特に過剰とはいえません。"},{"id":23,"cat":"保守","q":"使用開始直前の保守点検における流入管渠の点検作業に関する記述として、最も適当なものは次のうちどれか。","cs":["管渠内の堆積汚泥の清掃が行われていることを確認する。","生活排水と雨水が接続されていることを確認する。","屋外の起点から水を流し、停滞せずに流れることを確認する。","固形物が堆積しないよう泥だめ升が設けられていることを確認する。"],"ans":3,"exp":"使用開始前には水を流して管路の流通状況を確認することが重要です。"},{"id":24,"cat":"法令","q":"浄化槽法施行規則第3条に規定する清掃の技術上の基準に関する記述として、最も不適当なものは次のうちどれか。","cs":["沈殿分離槽の汚泥、スカム等の引き出しは、適正量とする。","汚泥濃縮貯留槽の汚泥、スカム等の引き出しは、脱離液を含めて全量とする。","脱窒濾床槽の汚泥、スカム等の引き出しは、第1室は全量とする。","消毒室及び消毒槽の汚泥、スカム等の引き出しは、適正量とする。"],"ans":2,"exp":"汚泥濃縮貯留槽の引き出しは脱離液を除いた汚泥・スカムを全量引き出します。"},{"id":25,"cat":"法令","q":"設備工事における申請・届出書類とその提出先の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["特定建設作業実施届（騒音）－市町村長及び特別区長","浄化槽設置届出書（建築確認申請または計画通知を必要としない場合で、保健所を設置する市の場合）－保健所長","浄化槽設置届出書（建築確認申請または計画通知を必要としない場合で、保健所を設置しない市の場合）－都道府県知事","道路使用許可申請－警察署長"],"ans":2,"exp":"保健所を設置する市の場合、浄化槽設置届出書の提出先は市長（保健所設置市長）です。"},{"id":26,"cat":"施工","q":"バーチャート工程表に関する記述として、最も不適当なものは次のうちどれか。","cs":["作成が容易で小規模工事に向いている。","複雑な工事には対応しづらい。","進度曲線を作成することにより、工事出来高の管理がしやすい。","各作業の施工時期、所要日数が把握しづらい。"],"ans":4,"exp":"バーチャート工程表は各作業の施工時期と所要日数が把握しやすいのが特徴です。"},{"id":27,"cat":"施工","q":"下図のネットワーク工程表においてクリティカルパスの本数と所要日数の組み合わせとして、正しいものは次のうちどれか。（A=5日、B=6日、C=2日、D=4日、E=5日、F=7日、G=5日、H=6日）","cs":["1本－20日","1本－19日","2本－20日","2本－19日"],"ans":4,"exp":"各経路の計算：(1)→(2)→(4)→(5)→(7)=5+4+5+5=19日、(1)→(3)→(5)→(7)=6+7+0+5=18日等を計算すると、クリティカルパスは2本で19日となります。"},{"id":28,"cat":"施工","q":"浄化槽の設置工事及び品質管理に関する記述として、最も不適当なものは次のうちどれか。","cs":["FRP製浄化槽は、水張り試験後、槽内の水抜きを行わずに埋め戻しを実施する。","浄化槽本体の据え付け前に、薬剤筒に消毒剤が所定量充填されているかを確認する。","一般に、電線等の連続体は抜き取り検査を実施する。","ポンプ、送風機等の主要機器は、全数検査を実施する。"],"ans":1,"exp":"FRP製浄化槽は水張り試験後も槽内に水を入れたまま（水張りしたまま）埋め戻しを行います。"},{"id":29,"cat":"法令","q":"地山の掘削作業主任者の職務として、労働安全衛生規則に規定されていないものは次のうちどれか。","cs":["作業の方法を決定し、作業を直接指揮すること。","器具及び工具を点検し、不良品を取り除くこと。","要求性能墜落制止用器具及び保護帽の使用状況を監視すること。","作業終了後、安全を確認し、事業者に報告すること。"],"ans":4,"exp":"作業終了後の事業者への報告は地山掘削作業主任者の法定職務に含まれません。"},{"id":30,"cat":"法令","q":"作業主任者の選任を必要とする作業として、労働安全衛生法にてらして、誤っているものは次のうちどれか。","cs":["アセチレン溶接装置を用いて行う金属の溶接作業","掘削面の高さが2m以上となる地山の掘削（ずい道及びたて坑以外の坑の掘削を除く。）作業","つり上げ荷重が1t以上5t未満の移動式クレーンの運転作業","酸素欠乏危険場所における作業"],"ans":3,"exp":"移動式クレーンの運転には作業主任者の選任は不要です（玉掛け作業には必要）。"},{"id":31,"cat":"施工","q":"山留め工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["木矢板工法は、掘削と並行して打ち下げていくため、施工中の根入れは少ない。","軽量鋼矢板は、その断面係数が小さいことから、小型のパイプロハンマーによる打ち込みが適している。","鋼矢板工法は、鋼矢板の継手部が確実にかみ合うことにより、水密性が高まる。","親杭横矢板工法は、根入れが深いためヒービング対策が容易となる。"],"ans":4,"exp":"親杭横矢板工法は根入れが他の工法より浅く、ヒービング対策が困難です。"},{"id":32,"cat":"施工","q":"工場生産型浄化槽の埋め戻し工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["掘削土が、石塊その他槽本体を傷つけるおそれのあるものや空隙を生じるおそれのあるものの混入がなく良質な場合は、そのまま埋め戻し土として使用してもよい。","粘土による埋め戻しは、隙間を埋めやすく十分な締め固めができる。","水締めと転圧機による突き固めは、1層の仕上り厚さの目安を30cm程度とする。","水締めの水量が多すぎると、砂が締まらなくなる。"],"ans":2,"exp":"粘土は透水性が低く、適切な締め固めが難しいため埋め戻し材として不適切です。"},{"id":33,"cat":"施工","q":"鉄筋コンクリート工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["木製型枠の乾燥している部分は、コンクリートの打ち込み前に散水しておく。","コンクリートの打ち込みにホースやシュートを用いる場合は、自由落下高さをできるだけ大きくとる。","コンクリートの打ち込み後は、硬化が十分進むまで、振動を防ぐよう養生する。","コンクリートの打ち込み後は、硬化が十分進むまで、散水や噴霧によって表面を湿潤に保つ。"],"ans":2,"exp":"コンクリートの自由落下高さが大きいと材料分離が生じます。できるだけ小さくする必要があります。"},{"id":34,"cat":"施工","q":"ポンプの構造的な分類の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["ターボポンプ－斜流ポンプ","ターボポンプ－軸流ポンプ","容積ポンプ－渦巻ポンプ","容積ポンプ－往復ポンプ"],"ans":3,"exp":"渦巻ポンプはターボポンプの一種です。容積ポンプではありません。"},{"id":35,"cat":"保守","q":"水質管理において、自動測定機器による測定値を継続して記録し、水量・水質の傾向を把握して活用することがある。これらの測定機器とその測定法の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["残留塩素計－導電率法","汚泥界面計－超音波測定法","COD計－滴定法","DO計－電極電位法"],"ans":1,"exp":"残留塩素計はDPD法や電流法を使用します。導電率法は電気伝導率の測定に使われます。"},{"id":36,"cat":"構造","q":"流量調整槽の内部設備に関する記述として、最も不適当なものは次のうちどれか。","cs":["流量調整槽内の腐敗防止のため、攪拌装置を設ける。","移送ポンプは2台以上設置し、レベルスイッチで運転制御を行う。","計量調整移送装置には、返送側と移送側にそれぞれせきを設ける。","微細目スクリーンの前段に、計量調整移送装置を配置する。"],"ans":4,"exp":"微細目スクリーンは流量調整の前段（前段処理）に設けます。計量調整移送装置の前にスクリーンを置きます。"},{"id":37,"cat":"構造","q":"放流ポンプ槽の内部設備に関する記述として、最も不適当なものは次のうちどれか。","cs":["放流ポンプは、故障時等に備えて同等の能力を有するものを2台以上設置する。","前段に流量調整槽が設けられている場合、放流ポンプの能力は日平均汚水量の1.5倍程度を揚水できるものとする。","ポンプ配管等の閉塞を防止するため、ポンプの吐出口径は20mm以上とする。","放流ポンプは、点検修理時に取り外しが容易となるように脱着型（自動接続型）とする。"],"ans":2,"exp":"前段に流量調整槽がある場合、放流ポンプ能力は日平均汚水量程度でよく、1.5倍は不要です。"},{"id":38,"cat":"施工","q":"排水管工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["埋め戻しは、管布設時に用いた仮固定材を取り除いて行った。","管路の遮方は、山留めと併用した。","浄化槽の放流管は、原則として敷地内で雨水管とは接続せずに、単独放流とした。","排水管の満水試験を、埋め戻し前に行った。"],"ans":2,"exp":"管路の遮方（しゃかた）は山留めとは別の作業です。この記述は意味が不明確であり不適当といえます。"},{"id":39,"cat":"施工","q":"排水管路に関する記述として、最も不適当なものは次のうちどれか。","cs":["大便器の排水接続管径を75mmとした。","排水管の種類や配管径が変化する箇所に升を設置した。","プラスチック成形品の升の側塊は、プラスチック用シール剤を用いて接合し、水密性を確保した。","VU100排水管において、約30度となる屈曲点の上流側と下流側の升までの距離が、それぞれ8mとなるため、その屈曲点に升を設置しなかった。"],"ans":4,"exp":"屈曲点には升を設置する必要があります。特に角度のある屈曲点での升の省略は不適当です。"},{"id":40,"cat":"施工","q":"低圧屋内配線に関する記述として、最も不適当なものは次のうちどれか。","cs":["屋内配線工事の設置場所は、展開した場所、点検できる隠ぺい場所、点検できない隠ぺい場所に区分される。","金属管工事において、電線の接続は、ジョイントボックスまたはプルボックス内で行う。","合成樹脂製可とう管は、重量物の圧力を受ける場所でも使用できる。","シーケンス試験は、制御、操作、インターロック回路等に誤りがないか確認するものである。"],"ans":3,"exp":"合成樹脂製可とう管（PF管等）は重量物の圧力を受ける場所での使用は避ける必要があります。"},{"id":41,"cat":"施工","q":"小型浄化槽の設備や装置における試運転・調整項目のうち、構造例示型浄化槽（嫌気濾床接触ばっ気方式）と性能評価型浄化槽（担体流動・生物濾過方式）に共通する項目として、最も適当なものは次のうちどれか。","cs":["逆洗装置の稼働状況","間欠定量ポンプの稼働状況","逆洗タイマの設定状況","循環装置の稼働状況"],"ans":1,"exp":"逆洗装置は両方式の浄化槽に共通して設けられ、試運転での確認項目となります。"},{"id":42,"cat":"施工","q":"試運転時の検査項目とチェック項目の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["浄化槽内の状況－装置の操作や試料の採取に支障がないこと。","接触ばっ気槽の状況－生物膜が均等、かつ正常に付着していること。","沈殿槽の状況－上澄水が正常に越流していること。","放流管渠における水の流れ方の状況－放流先水路と放流管底の水位差が適切であること。"],"ans":2,"exp":"試運転直後は微生物が定着していないため、生物膜の均等な付着を確認することはできません。"},{"id":43,"cat":"施工","q":"流量調整槽の移送ポンプの試運転に関する記述として、最も不適当なものは次のうちどれか。","cs":["水位に応じて起動・停止するかを確認する。","自動で2台のポンプが交互に切り替わるかを確認する。","時間最大汚水量に対応できる能力かを確認する。","正常な運転電流値であるかを確認する。"],"ans":3,"exp":"流量調整槽の移送ポンプは時間平均汚水量を移送できればよく、時間最大汚水量への対応は不要です。"},{"id":44,"cat":"法令","q":"浄化槽法における工事業登録の申請書に記載する事項として、最も不適当なものは次のうちどれか。","cs":["氏名または名称及び住所並びに法人にあっては、その代表者の氏名","営業所の名称及び所在地","浄化槽設備士の氏名及びその者が交付を受けた浄化槽設備士免状の交付番号","営業を行う区域"],"ans":4,"exp":"工事業登録申請書に営業を行う区域は記載不要です。"},{"id":45,"cat":"法令","q":"浄化槽法において、公共浄化槽の設置計画に定める事項として、最も不適当なものは次のうちどれか。","cs":["放流先または放流方法","着工予定年月日","保守点検業者の名称及び住所並びにその代表者の氏名","汚水を浄化槽に流入させるために必要な汚水管その他の排水施設を設置する場合には、当該施設の概要"],"ans":3,"exp":"公共浄化槽の設置計画に保守点検業者の名称等は記載不要です。"},{"id":46,"cat":"法令","q":"建設業に関する記述として、建設業法にてらして、誤っているものは次のうちどれか。","cs":["下請契約とは、建設工事を他の者から請け負った建設業を営む者と他の建設業を営む者との間で当該建設工事について締結される請負契約をいう。","2級管工事施工管理技士は、管工事業に係る一般建設業の許可を受ける建設業者が営業所ごとに専任で置く技術者としての要件を満たしている。","建設工事の請負契約の当事者は、契約の締結に際して、工事内容、請負代金の額、工事着手の時期及び工事完成の時期等を書面に記載し、相互に交付しなければならない。","建設業の許可は、10年ごとにその更新を受けなければ、その期間の経過によって、その効力を失う。"],"ans":4,"exp":"建設業の許可の有効期間は5年であり、5年ごとに更新が必要です。"},{"id":47,"cat":"法令","q":"浄化槽等に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["消毒槽は、汚水の塩素接触による消毒作用を有効に継続して行うことができる構造とすること。","屎尿浄化槽及び合併処理浄化槽は、満水して12時間は漏水しないことを確かめなければならない。","浄化槽の構造は、汚水処理性能に関する技術的基準に適合するもの、または国土交通大臣の認定を受けたものとしなければならない。","下水道法に規定する処理区域内において、便所は水洗便所以外の便所としてはならない。"],"ans":2,"exp":"漏水試験は24時間です。12時間ではありません。"},{"id":48,"cat":"法令","q":"浄化槽の一般構造に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["浄化槽に接続する配管は、閉塞、逆流及び漏水を生じない構造とすること。","槽の点検、保守、汚泥の管理及び清掃を容易かつ安全にすることができる構造とすること。","汚水の温度の上昇により処理機能に支障が生じない構造とすること。","必要に応じて換気のための措置を講ずること。"],"ans":3,"exp":"建築基準法の浄化槽一般構造規定に汚水温度の上昇に関する規定はありません。"},{"id":49,"cat":"法令","q":"次の文章中の[ ]内に当てはまる語句の組み合わせとして、下水道法にてらして、正しいものはどれか。下水道の処理区域内において、くみ取便所が設けられている[A]は、公示された下水の処理を開始すべき日から[B]以内に、その便所を水洗便所に改造しなければならない。","cs":["建築物を所有する者－1年","建築物を所有する者－3年","土地を所有する者－1年","土地を所有する者－3年"],"ans":2,"exp":"下水道法では建築物の所有者が3年以内に水洗便所に改造する義務があります。"},{"id":50,"cat":"法令","q":"次の建設資材のうち、建設工事に係る資材の再資源化等に関する法律にてらして、再資源化が特に必要とされる特定建設資材に該当しないものはどれか。","cs":["モルタル","コンクリートブロック","木材","アスファルト・コンクリート"],"ans":1,"exp":"モルタルは特定建設資材（コンクリート、木材、アスファルト・コンクリート）には含まれません。"}],"R5":[{"id":1,"cat":"基礎","q":"管内を流れる水に関する記述として、最も不適当なものは次のうちどれか。","cs":["管内を流れる水は、上流側から重力が作用し下流に向かって運ぶ仕事をする。","ベルヌーイの式が成り立つ要件の一つは、管内を流れる水自体に摩擦が作用しないことである。","ベルヌーイの式の3つの項は、速度水頭、位置水頭、圧力水頭という。","流れが定常であるとき、3つの水頭の和が一定であることを示しているのがエネルギー保存則である。"],"ans":2,"exp":"ベルヌーイの式が成り立つ条件は非圧縮性流体・定常流・流線上での適用であり、摩擦がない（完全流体）という条件もあります。しかし最も重要な前提は流れが定常で非圧縮であることです。"},{"id":2,"cat":"基礎","q":"配管に関する記述として、最も不適当なものは次のうちどれか。","cs":["流量が決まれば、流速を大きくすることによって配管の口径を細くすることができる。","汚水用配管の場合、流速は、最低0.6m/秒とされている。","配管内の摩擦抵抗は、流速の2倍に比例して大きくなる。","浄化槽の配管には、硬質ポリ塩化ビニル管が多用される。"],"ans":3,"exp":"管内摩擦損失はダルシー・ワイスバッハの式より流速の2乗に比例します。2倍ではありません。"},{"id":3,"cat":"水質","q":"水質項目に関する記述として、最も不適当なものは次のうちどれか。","cs":["pHは、水中の水素イオン濃度の逆数の常用対数として表される。","ORPは、反応槽内での硝化・脱窒反応の進行状態の把握に利用できる。","ヘキサン抽出物質は、水中に含まれる油脂類や鉱物油の指標として用いられる。","全窒素は、水質環境基準（健康項目）に定められている。"],"ans":4,"exp":"全窒素は生活環境項目（湖沼・海域）の水質環境基準に定められています。健康項目ではありません。"},{"id":4,"cat":"水質","q":"ある浄化槽の流入水及び放流水の水量、BOD濃度が下表に示す値のとき、この浄化槽のBOD除去率(%)として、正しい値は次のうちどれか。流入水：水洗便所汚水30m3乗/日・260mg/L、雑排水90m3乗/日・180mg/L。放流水：120m3乗/日・10mg/L。","cs":["80","85","90","95"],"ans":4,"exp":"流入BOD量=30x260+90x180=7800+16200=24000g/日。流入BOD濃度=24000/120=200mg/L。除去率=(200-10)/200x100=95%。"},{"id":5,"cat":"基礎","q":"電気設備の機器とその機能または効果に関する語句の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["電磁接触器－回路の開閉","漏電遮断器－過負荷保護","進相コンデンサ－力率改善","インバーター－電動機の変速運転"],"ans":2,"exp":"漏電遮断器は漏電を検出して回路を遮断する保護装置です。過負荷保護は過電流遮断器の機能です。"},{"id":6,"cat":"基礎","q":"鉄筋コンクリートに関する記述として、最も不適当なものは次のうちどれか。","cs":["コンクリートのワーカビリティーは、スランプ値が大きいほどよくなる。","水セメント比の数値が高いほど、コンクリート強度が高くなる。","鉄筋の曲げ加工は、冷間加工とする。","鉄筋の重ね継手の長さは、コンクリート強度が小さいほど長くなる。"],"ans":2,"exp":"水セメント比が低いほどコンクリート強度は高くなります。水が多いと強度が低下します。"},{"id":7,"cat":"基礎","q":"下図に示す集中荷重Pを受ける片持ち梁の曲げモーメント図として、正しいものは次のうちどれか。","cs":["先端から固定端に向かって直線的に増加するモーメント図","先端から固定端に向かって曲線的に増加するモーメント図","均等なモーメントが分布するモーメント図","先端と固定端の中間点で最大となるモーメント図"],"ans":2,"exp":"2つの集中荷重Pを受ける片持ち梁では、固定端に近いほどモーメントが大きく、階段状（折線状）のモーメント図になります。"},{"id":8,"cat":"法令","q":"「公共工事標準請負契約約款」に関する記述として、誤っているものは次のうちどれか。","cs":["受注者は、確保された工事用地を善良な管理者の注意を持って管理しなければならない。","不用となった工事用地にある受注者が管理する建設機械器具を、受注者が正当な理由なく相当の期間内に撤去しない場合は、発注者が受注者に代わって処分することができる。","設計図書の変更によって工事用地が不用となった場合において、当該工事用地に受注者が所有する仮設物があるときは、受注者は、当該物件を撤去しなければならない。","受注者は、設計図書で定められた工事の施工上必要な用地を発注者が工事の施工上必要とする日までに確保しなければならない。"],"ans":4,"exp":"工事用地の確保は発注者の義務です。受注者ではありません。"},{"id":9,"cat":"構造","q":"次の処理方式のうち、生物膜法に分類されないものはどれか。","cs":["接触ばっ気方式","回転板接触方式","生物濾過方式","長時間ばっ気方式"],"ans":4,"exp":"長時間ばっ気方式は活性汚泥法の一種であり、生物膜法には分類されません。"},{"id":10,"cat":"水質","q":"ばっ気に関する記述として、最も不適当なものは次のうちどれか。","cs":["ばっ気の目的には、微生物に対する酸素供給と槽内水の攪拌がある。","ばっ気は、一般的にブロワから槽内に空気を吹き込んで行う。","飽和溶存酸素濃度は、水温が高いほど高くなる。","ばっ気の強さを表す指標として、ばっ気強度がある。"],"ans":3,"exp":"水温が高いほど酸素は溶けにくくなるため、飽和溶存酸素濃度は低くなります。"},{"id":11,"cat":"水質","q":"塩素消毒に関する記述として、最も不適当なものは次のうちどれか。","cs":["次亜塩素酸が硝酸イオンと反応すると、クロラミンが生成する。","遊離塩素は、結合塩素よりも消毒効果が高い。","処理水のpHが低いほど、塩素による消毒効果は高くなる。","固形の消毒剤の成分として、塩素化イソシアヌール酸などがある。"],"ans":1,"exp":"クロラミンはアンモニアと塩素が反応して生成します。硝酸イオンとは反応しません。"},{"id":12,"cat":"水質","q":"含水率98.5%の汚泥15.0m3乗を濃縮して含水率97.0%とした場合、濃縮後の汚泥の容積(m3乗)として、最も適当な値は次のうちどれか。","cs":["5.0","7.5","10.0","12.5"],"ans":2,"exp":"固形物量=15x0.015=0.225m3乗。97%含水なら固形物は3%。濃縮後容量=0.225/0.03=7.5m3乗。"},{"id":13,"cat":"水質","q":"5人槽の小型浄化槽の循環水量(L/分)として、最も近い値は次のうちどれか。ただし、1日当たりの流入汚水量を0.8m3乗、循環比を3とする。","cs":["1.7","2.1","3.4","4.2"],"ans":1,"exp":"循環水量=0.8x3/(24x60)x1000=2400/1440約1.67L/分約1.7L/分。"},{"id":14,"cat":"水質","q":"生物学的硝化脱窒法における窒素化合物の変化の過程として、最も適当なものは次のうちどれか。","cs":["硝酸性窒素→亜硝酸性窒素→アンモニア性窒素→窒素ガス","アンモニア性窒素→亜硝酸性窒素→硝酸性窒素→窒素ガス","亜硝酸性窒素→アンモニア性窒素→硝酸性窒素→窒素ガス","硝酸性窒素→アンモニア性窒素→亜硝酸性窒素→窒素ガス"],"ans":2,"exp":"硝化：アンモニア性窒素→亜硝酸性窒素→硝酸性窒素、脱窒：硝酸性窒素→窒素ガスの順序です。"},{"id":15,"cat":"構造","q":"下図は、流量調整槽内の水位とポンプの起動・停止位置の事例を模式的に示したものである。図に示す(1)〜(4)の「水位と水位の間隔」のうち、流量調整槽の有効水深に相当するものとして、最も適当なものはどれか。","cs":["警報水位〜高水位","高水位〜常用ポンプ起動位置","低水位〜常用ポンプ停止位置","低水位〜高水位"],"ans":4,"exp":"流量調整槽の有効水深は低水位（LWL）から高水位（HWL）までの間です。"},{"id":16,"cat":"構造","q":"構造基準の第1に示された嫌気濾床槽の構造に関する記述として、最も不適当なものは次のうちどれか。ただし、1人1日当たりの計画汚水量は0.2m3乗とする。","cs":["2室区分の場合、第1室と第2室の容量比は2：1程度である。","基礎容量（処理対象人員5人）の滞留時間は、1.5日である。","濾材の充填率は、第1室にあっては約80%とする。","第2室の水の流れは、上向流の場合もある。"],"ans":3,"exp":"第1室の濾材充填率は約40%（夾雑物貯留部を確保するため）です。80%ではありません。"},{"id":17,"cat":"構造","q":"担体流動法に関する記述として、最も不適当なものは次のうちどれか。","cs":["タイマ運転で作動する逆洗装置を設ける。","担体に付着した微生物による生物酸化を行う生物膜法の一つである。","担体同士が衝突して生物膜の肥厚が抑制される。","担体を流動させるため、散気装置を担体流動槽内に設ける。"],"ans":1,"exp":"担体流動槽に逆洗装置は設けません。逆洗は生物濾過槽に設けるものです。"},{"id":18,"cat":"構造","q":"構造基準の第6に示された接触ばっ気槽に関する記述として、最も不適当なものは次のうちどれか。","cs":["BOD接触材負荷に基づき有効容量を算出する。","2室以上に区分して短絡を防止する。","接触材の充填率は55%以上とする。","第2室以降にも逆洗装置を設置する。"],"ans":4,"exp":"逆洗装置は第1室のみに設置し、第2室以降には設置しません。"},{"id":19,"cat":"構造","q":"1日当たり1.0m3乗の汚水を処理する小型浄化槽の薬剤筒内に、1錠100g、有効塩素量75%の次亜塩素酸カルシウム錠を消毒剤として8錠充填した。処理水1.0m3乗当たり有効塩素5gが溶解する場合、充填した消毒剤がすべて消費されるまでの日数(日)として、最も適当な値は次のうちどれか。","cs":["100","120","140","160"],"ans":2,"exp":"有効塩素総量=100x8x0.75=600g。1日消費5g。600/5=120日。"},{"id":20,"cat":"構造","q":"JIS A 3302：2000に規定する処理対象人員の算定基準に定められている建築用途と算定単位の組み合わせとして、最も適当なものは次のうちどれか。","cs":["テニス場－コート面数(面)","マージャンクラブ－卓数(卓)","ボーリング場－延べ面積(m2乗)","キャンプ場－総便器数(個)"],"ans":2,"exp":"マージャンクラブの算定単位は卓数(卓)です。"},{"id":21,"cat":"水質","q":"以下の条件で運転されているばっ気槽のBOD容積負荷を、現在の値から0.1kg/(m3乗・日)下げるために必要な増設容量(m3乗)として、正しい値は次のうちどれか。条件：流入汚水量100m3乗/日、流入BOD濃度300mg/L、現在のばっ気槽容量100m3乗","cs":["50","75","100","150"],"ans":1,"exp":"現BOD容積負荷=0.3kg/m3乗・日。目標=0.2kg/m3乗・日。必要容量=30/0.2=150m3乗。増設=50m3乗。"},{"id":22,"cat":"水質","q":"浄化槽に流入する排水の特性に関する記述として、最も不適当なものは次のうちどれか。","cs":["建築用途によって、水量・水質ともに種々の特性がある。","排水量の時間的変動のパターンは、特に流量調整槽の容量の算定に影響する。","中華料理店等の油脂を多く含む排水は、浄化槽の処理機能に悪影響を与える。","宴会場を有するホテル・旅館の排水は、住宅排水と比較すると窒素が過剰である。"],"ans":4,"exp":"宴会場を有するホテル・旅館の排水はBODが高い傾向がありますが、窒素が特に過剰とはいえません。"},{"id":23,"cat":"保守","q":"使用開始直前の保守点検における流入管渠の点検作業に関する記述として、最も適当なものは次のうちどれか。","cs":["管渠内の堆積汚泥の清掃が行われていることを確認する。","生活排水と雨水が接続されていることを確認する。","屋外の起点から水を流し、停滞せずに流れることを確認する。","固形物が堆積しないよう泥だめ升が設けられていることを確認する。"],"ans":3,"exp":"起点から水を流して管路の流通状況（停滞なく流れるか）を確認します。"},{"id":24,"cat":"法令","q":"浄化槽法施行規則第3条に規定する清掃の技術上の基準に関する記述として、最も不適当なものは次のうちどれか。","cs":["沈殿分離槽の汚泥、スカム等の引き出しは、適正量とする。","汚泥濃縮貯留槽の汚泥、スカム等の引き出しは、脱離液を含めて全量とする。","脱窒濾床槽の汚泥、スカム等の引き出しは、第1室は全量とする。","消毒室及び消毒槽の汚泥、スカム等の引き出しは、適正量とする。"],"ans":2,"exp":"汚泥濃縮貯留槽の汚泥引き出しは脱離液を含めてではなく、汚泥・スカムを適正量引き出します。"},{"id":25,"cat":"法令","q":"設備工事における申請・届出書類とその提出先の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["特定建設作業実施届（騒音）－市町村長及び特別区長","浄化槽設置届出書（保健所を設置する市の場合）－保健所長","浄化槽設置届出書（保健所を設置しない市の場合）－都道府県知事","道路使用許可申請－警察署長"],"ans":2,"exp":"保健所を設置する市の場合、届出先は市長です。保健所長ではありません。"},{"id":26,"cat":"施工","q":"バーチャート工程表に関する記述として、最も不適当なものは次のうちどれか。","cs":["作成が容易で小規模工事に向いている。","複雑な工事には対応しづらい。","進度曲線を作成することにより、工事出来高の管理がしやすい。","各作業の施工時期、所要日数が把握しづらい。"],"ans":4,"exp":"バーチャート工程表は各作業の期間が一目でわかるため、施工時期・所要日数の把握が容易です。"},{"id":27,"cat":"施工","q":"下図のネットワーク工程表において、クリティカルパスの本数と所要日数の組み合わせとして、正しいものは次のうちどれか。（A=5日、B=6日、C=2日、D=4日、E=5日、F=7日、G=5日、H=6日）","cs":["1本－20日","1本－19日","2本－20日","2本－19日"],"ans":4,"exp":"経路(1)→(3)→(5)→(7)：B+F+H=6+7+6=19日。経路(1)→(2)→(4)→(5)→(7)：A+D+E+G=5+4+5+5=19日。2本で19日。"},{"id":28,"cat":"施工","q":"浄化槽の設置工事及び品質管理に関する記述として、最も不適当なものは次のうちどれか。","cs":["FRP製浄化槽は、水張り試験後、槽内の水抜きを行わずに埋め戻しを実施する。","浄化槽本体の据え付け前に、薬剤筒に消毒剤が所定量充填されているかを確認する。","一般に、電線等の連続体は抜き取り検査を実施する。","ポンプ、送風機等の主要機器は、全数検査を実施する。"],"ans":1,"exp":"水張り試験後も水を張ったまま埋め戻しを実施します。水を抜くと浮力で槽が浮き上がります。"},{"id":29,"cat":"法令","q":"地山の掘削作業主任者の職務として、労働安全衛生規則に規定されていないものは次のうちどれか。","cs":["作業の方法を決定し、作業を直接指揮すること。","器具及び工具を点検し、不良品を取り除くこと。","要求性能墜落制止用器具及び保護帽の使用状況を監視すること。","作業終了後、安全を確認し、事業者に報告すること。"],"ans":4,"exp":"作業終了後の事業者への報告は法定職務に含まれていません。"},{"id":30,"cat":"法令","q":"作業主任者の選任を必要とする作業として、労働安全衛生法にてらして、誤っているものは次のうちどれか。","cs":["アセチレン溶接装置を用いて行う金属の溶接作業","掘削面の高さが2m以上となる地山の掘削作業","つり上げ荷重が1t以上5t未満の移動式クレーンの運転作業","酸素欠乏危険場所における作業"],"ans":3,"exp":"移動式クレーンの運転には作業主任者の選任は不要です。"},{"id":31,"cat":"施工","q":"山留め工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["木矢板工法は、掘削と並行して打ち下げていくため、施工中の根入れは少ない。","軽量鋼矢板は、その断面係数が小さいことから、小型のパイプロハンマーによる打ち込みが適している。","鋼矢板工法は、鋼矢板の継手部が確実にかみ合うことにより、水密性が高まる。","親杭横矢板工法は、根入れが深いためヒービング対策が容易となる。"],"ans":4,"exp":"親杭横矢板工法は根入れが浅く、ヒービング対策が困難です。"},{"id":32,"cat":"施工","q":"工場生産型浄化槽の埋め戻し工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["掘削土が良質な場合は、そのまま埋め戻し土として使用してもよい。","粘土による埋め戻しは、隙間を埋めやすく十分な締め固めができる。","水締めと転圧機による突き固めは、1層の仕上り厚さの目安を30cm程度とする。","水締めの水量が多すぎると、砂が締まらなくなる。"],"ans":2,"exp":"粘土は適切な締め固めが難しく埋め戻し材に不適切です。"},{"id":33,"cat":"施工","q":"鉄筋コンクリートに関する記述として、最も不適当なものは次のうちどれか。","cs":["鉄筋コンクリートは、鉄筋が引張応力を、コンクリートが圧縮応力を負担している。","コンクリートは、空気中の炭酸ガスの作用により中性化し、鉄筋の防錆力が高まる。","アルカリ骨材反応は、骨材中のシリカ鉱物がアルカリ成分と反応して膨張し、コンクリートを内部から崩壊させる現象である。","高炉セメントは、製鉄所から出る高炉スラグの微粉末を混合したセメントで、耐海水性に優れている。"],"ans":2,"exp":"中性化が進むとコンクリートのアルカリ性が失われ、鉄筋の防錆力は低下します。高まるではなく低下します。"},{"id":34,"cat":"施工","q":"ポンプの分類と構造の組み合わせとして、最も不適当なものは次のうちどれか。（図問題）","cs":["軸流ポンプ","渦巻ポンプ","プランジャーポンプ","ダイアフラムポンプ"],"ans":1,"exp":"図に示されたポンプ構造と名称の組み合わせで最も不適当なものを選びます。"},{"id":35,"cat":"保守","q":"ロータリ型ブロワの異常な現象と原因の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["起動しない－モータの絶縁不良","異常な発熱－オイル切れ","吐出空気量が少ない－ベルトの張り過ぎ","振動・異音の発生－ブロワと建物との接触"],"ans":3,"exp":"ベルトの張り過ぎは振動・異音の原因となります。吐出空気量の低下はベルトのスリップ（緩み）が原因です。"},{"id":36,"cat":"構造","q":"スクリーン設備に関する記述として、最も不適当なものは次のうちどれか。","cs":["自動掻き上げ式荒目スクリーンには、し渣受けかごを設ける。","ばっ気型スクリーンは、スクリーン上部にばっ気用散気管を設ける。","ばっ気沈砂槽は、土砂と汚物を分離させるため散気装置を設ける。","破砕装置の副水路では、予備スクリーンを設ける。"],"ans":2,"exp":"ばっ気型スクリーンの散気管はスクリーン下部に設けます。上部ではありません。"},{"id":37,"cat":"構造","q":"浄化槽に必要な機能と付属設備の組み合わせとして、最も不適当なものは次のうちどれか。","cs":["はく離汚泥移送－ターボポンプ","ばっ気攪拌－散気装置","消泡－消泡ノズル","定量移送－分水計量装置"],"ans":1,"exp":"はく離汚泥の移送にはエアリフトポンプや水中ポンプを使用します。ターボポンプは不適切です。"},{"id":38,"cat":"施工","q":"排水管工事に関する記述として、最も不適当なものは次のうちどれか。","cs":["口径50mmの排水管を地中に埋設した。","小便器に接続する排水管の口径を50mmとした。","偏芯継手を用い、排水の下流方向へ管径を縮小した。","トラップと同じ径の排水管を接続した。"],"ans":3,"exp":"排水管の管径は下流方向に縮小してはなりません。流れが滞る原因となります。"},{"id":39,"cat":"施工","q":"塩化ビニル管の切断及び接着接合に関する記述として、最も不適当なものは次のうちどれか。","cs":["接着剤は、受口内面及び差口外面の標線位置まで均一に塗布する。","接着剤塗布後は、ねじりながら標線位置まで差し込む。","差し込み後、受口テーパーの影響で抜け出してくる場合があるため、呼び径50mmでは30秒以上押さえておく。","管の切断は、目の細かいのこで行う。"],"ans":2,"exp":"接着接合では差し込む際にねじってはいけません。一気に差し込んで保持します。"},{"id":40,"cat":"施工","q":"D種接地工事の接地抵抗値として、最も適当なものは次のうちどれか。ただし、低圧回路において、地絡を生じた場合に0.5秒以内に当該回路を自動的に遮断する装置を施設する場合を除く。","cs":["1オーム以下","10オーム以下","100オーム以下","1,000オーム以下"],"ans":3,"exp":"D種接地工事の接地抵抗値は100オーム以下です。"},{"id":41,"cat":"施工","q":"浄化槽工事の漏水検査に関する次の文章中の[ ]内の語句のうち、最も不適当なものはどれか。漏水検査は、槽内に水を満たして[1 24時間経過後]に水位が[2 低下していないか]を確かめるものである。現場打ちコンクリート構造物の漏水は、ほとんどが[3 設計不良]を原因としており、[4 コンクリート施工法]の正しい知識があれば防止できるものが多い。","cs":["1","2","3","4"],"ans":3,"exp":"現場打ちコンクリートの漏水の主な原因は施工不良（打設・養生ミス等）です。設計不良ではありません。"},{"id":42,"cat":"施工","q":"小型浄化槽の工事完了後の確認における検査項目とチェックポイントの組み合わせとして、最も不適当なものは次のうちどれか。","cs":["升の位置及び種類－起点、屈曲点、合流点及び一定間隔ごとにトラップ升が設置されているか。","浄化槽本体上部－コンクリートスラブが打たれているか。","ブロワの設置状況－防振対策がなされているか。","消毒装置の固定状況－薬剤筒が傾いていないか。"],"ans":1,"exp":"排水管の升はトラップ升だけでなく、屈曲・合流・起点等に設けます。すべての升にトラップが必要なわけではありません。"},{"id":43,"cat":"施工","q":"生物膜法を用いた窒素除去型小型浄化槽の試運転・調整時の確認事項として、最も不適当なものは次のうちどれか。","cs":["逆洗装置の作動条件の調整機能","循環装置の循環水量の調整機能","散気装置の送風量の調整機能","返送汚泥装置の返送量の調整機能"],"ans":4,"exp":"生物膜法の窒素除去型浄化槽には活性汚泥の返送汚泥装置はありません。"},{"id":44,"cat":"法令","q":"特定既存単独処理浄化槽に関する記述として、最も不適当なものは次のうちどれか。","cs":["特定既存単独処理浄化槽とは、そのまま放置すれば生活環境の保全及び公衆衛生上重大な支障が生ずるおそれのある状態にあると認められる既存単独処理浄化槽をいう。","都道府県知事は、特定既存単独処理浄化槽の浄化槽管理者に対し、除却その他生活環境の保全及び公衆衛生上必要な措置をとるよう指導及び助言をすることができる。","都道府県知事は、特定既存単独処理浄化槽の浄化槽管理者に対し、除却その他必要な措置をとることを勧告することができる。","下水道処理区域内の単独処理浄化槽は、特定既存単独処理浄化槽に指定されない。"],"ans":4,"exp":"下水道処理区域内の単独処理浄化槽も特定既存単独処理浄化槽に指定される可能性があります。"},{"id":45,"cat":"法令","q":"浄化槽管理者の義務として、浄化槽法及び浄化槽法施行規則に規定されていないものは次のうちどれか。","cs":["保守点検の実施","清掃の記録の保存","設置後の水質検査の受検","ブロワの電力使用量の記録"],"ans":4,"exp":"ブロワの電力使用量の記録は浄化槽法に規定されている義務ではありません。"},{"id":46,"cat":"法令","q":"主任技術者及び監理技術者の職務として、建設業法に規定されていないものは次のうちどれか。","cs":["当該建設工事の施工計画の作成","当該建設工事の工程管理","当該建設工事の下請契約の締結","当該建設工事の施工に従事する者の技術上の指導監督"],"ans":3,"exp":"下請契約の締結は主任技術者・監理技術者の法定職務ではありません。"},{"id":47,"cat":"法令","q":"排水槽に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["汚水や臭気が漏れないよう水密かつ防臭構造とし、通気管を有しないこと。","原則として、内部の保守点検を容易にかつ安全に行うことができる位置にマンホールを設けること。","汚泥等を容易に排出できる構造とすること。","槽の底の勾配は、吸い込みピットに向かって15分の1以上、10分の1以下とすること。"],"ans":1,"exp":"排水槽は通気管を設ける必要があります。通気管がないと臭気が逆流したり内圧が変動します。"},{"id":48,"cat":"法令","q":"浄化槽の一般構造に関する記述として、建築基準法にてらして、誤っているものは次のうちどれか。","cs":["浄化槽に接続する配管は、閉塞、逆流及び漏水を生じない構造とすること。","槽の点検、保守、汚泥の管理及び清掃を容易かつ安全にすることができる構造とすること。","汚水の温度の上昇により処理機能に支障が生じない構造とすること。","必要に応じて換気のための措置を講ずること。"],"ans":3,"exp":"浄化槽の一般構造に関する建築基準法の規定に汚水温度の上昇に関する項目はありません。"},{"id":49,"cat":"法令","q":"次の記述のうち、下水道法及び下水道法施行令にてらして、誤っているものはどれか。","cs":["公共下水道管理者は、公共下水道台帳の閲覧を求められた場合においては、これを拒むことができない。","汚水を排除すべき排水施設は、地震によって下水の排除及び処理に支障が生じないようにすること。","排水設備の管渠の勾配は、やむを得ない場合を除き、100分の1以上とすること。","公共下水道等の点検は、下水の貯留その他の原因により腐食するおそれが大きいものとして国土交通省令で定める排水施設にあっては、10年に1回以上の適切な頻度で行うこと。"],"ans":4,"exp":"10年に1回ではなく、国土交通省令で定める頻度（概ね5年）での点検が義務付けられています。"},{"id":50,"cat":"法令","q":"水質汚濁防止法に規定する排水基準の項目として、誤っているものは次のうちどれか。","cs":["フェノール類含有量","生物化学的酸素要求量","溶存酸素量","浮遊物質量"],"ans":3,"exp":"溶存酸素量は排水基準の項目ではありません。排水基準はBOD・COD・SS等であり、DO（流入側）は基準外です。"}]};
var _curYear = '';
var _curQs = [];
var _aiText = '';

var state = {ans:{}, year:''};
try { var _sv = localStorage.getItem('jokaso_v4'); if (_sv) state = JSON.parse(_sv); } catch(e) {}
function save() { try { localStorage.setItem('jokaso_v4', JSON.stringify(state)); } catch(e) {} }

function showMenu() {
  document.getElementById('menu-screen').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('hdr-title').textContent = '浄化槽設備士 対策';
  var tbody = document.getElementById('stat-body');
  tbody.innerHTML = '';
  var years = Object.keys(DB).sort().reverse();
  for (var i = 0; i < years.length; i++) {
    (function(yr) {
      var total = DB[yr].length;
      var ans = state.ans[yr] || {};
      var done = Object.keys(ans).length;
      var wrong = 0;
      for (var k in ans) { if (!ans[k].ok) wrong++; }
      var tr = document.createElement('tr');
      var td1 = document.createElement('td'); td1.textContent = yr; tr.appendChild(td1);
      var td2 = document.createElement('td'); td2.textContent = total + '問'; tr.appendChild(td2);
      var td3 = document.createElement('td');
      td3.textContent = done + '/' + total;
      if (wrong > 0) {
        var sp = document.createElement('span');
        sp.textContent = ' 苦手' + wrong;
        sp.style.color = '#e53935'; sp.style.fontSize = '11px';
        td3.appendChild(sp);
      }
      tr.appendChild(td3);
      var td4 = document.createElement('td');
      var btn = document.createElement('button');
      btn.className = 'start-btn'; btn.textContent = '開始';
      btn.onclick = function() { loadYear(yr); };
      td4.appendChild(btn); tr.appendChild(td4); tbody.appendChild(tr);
    })(years[i]);
  }
}

function loadYear(yr) {
  _curYear = yr;
  state.year = yr; save();
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('hdr-title').textContent = yr + '年度演習';
  _curQs = DB[yr].slice();
  renderQuiz();
  window.scrollTo(0, 0);
}

function showWrong() {
  if (!state.year || !DB[state.year]) { showMenu(); return; }
  var ans = state.ans[state.year] || {};
  var wrongQs = [];
  for (var i = 0; i < DB[state.year].length; i++) {
    var q = DB[state.year][i];
    if (ans[q.id] && !ans[q.id].ok) wrongQs.push(q);
  }
  if (wrongQs.length === 0) { alert('苦手問題はありません！'); return; }
  _curYear = state.year;
  _curQs = wrongQs;
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('hdr-title').textContent = state.year + ' 苦手克服';
  renderQuiz();
  window.scrollTo(0, 0);
}

function renderQuiz() {
  var container = document.getElementById('q-content');
  container.innerHTML = '';
  var questions = _curQs;
  for (var qi = 0; qi < questions.length; qi++) {
    (function(q) {
      var userAns = (state.ans[_curYear] || {})[q.id];
      var card = document.createElement('div');
      card.className = 'card';

      var meta = document.createElement('div');
      meta.className = 'q-meta';
      meta.textContent = '問' + q.id + '【' + q.cat + '】';
      card.appendChild(meta);

      var qtext = document.createElement('div');
      qtext.className = 'q-text';
      qtext.textContent = q.q;
      card.appendChild(qtext);

      for (var ci = 0; ci < q.cs.length; ci++) {
        (function(text, idx) {
          var btn = document.createElement('button');
          btn.className = 'choice';
          btn.textContent = '(' + (idx + 1) + ') ' + text;
          if (userAns) {
            btn.disabled = true;
            if (idx + 1 === q.ans) btn.classList.add('correct');
            else if (userAns.val === idx + 1) btn.classList.add('wrong');
          } else {
            (function(val) {
              btn.onclick = function() {
                if (!state.ans[_curYear]) state.ans[_curYear] = {};
                state.ans[_curYear][q.id] = {val: val, ok: val === q.ans};
                save();
                renderQuiz();
                setTimeout(function() {
                  var cards = document.getElementById('q-content').getElementsByClassName('card');
                  if (cards[qi]) cards[qi].scrollIntoView({behavior:'smooth', block:'center'});
                }, 100);
              };
            })(idx + 1);
          }
          card.appendChild(btn);
        })(q.cs[ci], ci);
      }

      if (userAns) {
        var expBox = document.createElement('div');
        expBox.className = 'exp-box';
        expBox.innerHTML = '<strong>解説:</strong> ' + q.exp;

        var copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '問題文を表示する';
        expBox.appendChild(copyBtn);

        var copyDiv = document.createElement('div');
        copyDiv.className = 'copy-text';
        expBox.appendChild(copyDiv);

        (function(cb, cd, qq) {
          function toggleCopy() {
            if (cd.style.display === 'none' || cd.style.display === '') {
              var txt = '【問' + qq.id + '】' + qq.q + ' (1)' + qq.cs[0] + ' (2)' + qq.cs[1] + ' (3)' + qq.cs[2] + ' (4)' + qq.cs[3] + ' 正解：(' + qq.ans + ')' + qq.cs[qq.ans - 1] + ' 解説：' + qq.exp;
              cd.style.display = 'block';
              cd.innerText = txt;
              cb.textContent = '閉じる';
              _aiText = txt;
            } else {
              cd.style.display = 'none';
              cb.textContent = '問題文を表示する';
            }
          }
          cb.onclick = toggleCopy;
          cb.ontouchend = function(e) { e.preventDefault(); toggleCopy(); };

          var _longTimer = null;
          cd.oncontextmenu = function(e) {
            e.preventDefault();
            if (cd.innerText) { _aiText = cd.innerText; showAiMenu(); }
          };
          cd.ontouchstart = function() {
            _longTimer = setTimeout(function() {
              if (cd.innerText) { _aiText = cd.innerText; showAiMenu(); }
            }, 600);
          };
          cd.ontouchend = function() { clearTimeout(_longTimer); };
          cd.ontouchmove = function() { clearTimeout(_longTimer); };
        })(copyBtn, copyDiv, q);

        card.appendChild(expBox);
      }
      container.appendChild(card);
    })(questions[qi]);
  }
}

function showAiMenu() {
  document.getElementById('ai-menu').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

function closeAiMenu() {
  document.getElementById('ai-menu').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function askAI(url) {
  closeAiMenu();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(_aiText).then(function() {
      window.open(url, '_blank');
    }).catch(function() { window.open(url, '_blank'); });
  } else {
    window.open(url, '_blank');
  }
}

showMenu();
</script>
</body>
</html>
